<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Lossless Library Editor</title>
</head>
<body>

<h1>Ajouter une musique</h1>

<h2>Paramètres</h2>
<button onclick="clearSavedSettings()">🗑️ Effacer token GitHub + URL manifest sauvegardés</button>
<p id="settingsStatus"></p>

<hr>

<h2>1. Ajout manuel</h2>
<label>Titre : <input id="song" type="text"></label><br><br>
<label>Artiste : <input id="artist" type="text"></label><br><br>
<label>URL FLAC : <input id="url" type="text"></label><br><br>
<label>Ou upload fichier FLAC : <input id="fileInput" type="file" accept=".flac"></label><br><br>
<button onclick="submitEntry()">Send</button>

<p id="status"></p>

<hr>

<h2>2. Auto-download via addon Eclipse</h2>
<label>URL du manifest.json de l'addon : <input id="manifestUrl" type="text" size="60" placeholder="https://mon-addon.com/manifest.json"></label>
<button onclick="loadManifest()">Charger l'addon</button>
<p id="manifestStatus"></p>

<br>
<label>Recherche : <input id="searchQuery" type="text"></label>
<button onclick="searchAddon()">Chercher</button>

<div id="searchResults"></div>

<p id="autoStatus"></p>

<hr>

<h2>3. Import en masse (CSV)</h2>
<p>Format attendu (comme un export Vibes) :</p>
<pre>Title: Nom de la chanson
Artist: Nom de l'artiste
Album: 
Duration: 135
URL: https://music.youtube.com/watch?v=xxxx</pre>

<label>Fichier CSV : <input id="csvFile" type="file" accept=".csv,.txt"></label><br><br>

<button onclick="startBulkImport()">Lancer l'import</button>
<button onclick="cancelBulkImport()" id="cancelBtn" disabled>Annuler</button>

<div style="margin-top:10px; width:400px; border:1px solid #000;">
    <div id="progressBar" style="height:20px; width:0%; background:green;"></div>
</div>
<p id="bulkStatus"></p>
<ul id="bulkLog"></ul>

<script>
    const owner = "Biskwuit";
    const repo = "Lossless-Library";
    const path = "music.json";
    const branch = "main";

    const CORS_PROXY = "https://cors.zizicabane.stream/";

    const LS_TOKEN_KEY = "eclipse_github_token";
    const LS_MANIFEST_KEY = "eclipse_manifest_url";

    let githubToken = localStorage.getItem(LS_TOKEN_KEY) || "";
    let addonBaseUrl = "";
    let bulkImportCancelled = false;

    // ---------- Init : restaure les valeurs sauvegardées ----------

    window.addEventListener("DOMContentLoaded", () => {
        const savedManifestUrl = localStorage.getItem(LS_MANIFEST_KEY);
        if (savedManifestUrl) {
            document.getElementById("manifestUrl").value = savedManifestUrl;
            addonBaseUrl = savedManifestUrl.replace(/\/manifest\.json\/?$/, "");
            document.getElementById("manifestStatus").textContent = "URL restaurée depuis le cache local. Clique sur 'Charger l'addon' pour vérifier.";
        }
    });

    function getToken() {
        if (!githubToken) {
            githubToken = prompt("Entre ton GitHub Personal Access Token :");
            if (githubToken) {
                localStorage.setItem(LS_TOKEN_KEY, githubToken);
            }
        }
        return githubToken;
    }

    function clearSavedSettings() {
        localStorage.removeItem(LS_TOKEN_KEY);
        localStorage.removeItem(LS_MANIFEST_KEY);
        githubToken = "";
        addonBaseUrl = "";
        document.getElementById("manifestUrl").value = "";
        document.getElementById("settingsStatus").textContent = "Token et URL manifest supprimés du cache local.";
        document.getElementById("manifestStatus").textContent = "";
    }

    // ---------- GitHub JSON helpers ----------

    async function getFile() {
        const res = await fetch(`https://api.github.com/repos/${owner}/${repo}/contents/${path}?ref=${branch}`, {
            headers: { Authorization: `token ${getToken()}` }
        });
        if (!res.ok) throw new Error("Erreur lors de la lecture du fichier JSON");
        const data = await res.json();
        const content = JSON.parse(atob(data.content));
        return { content, sha: data.sha };
    }

    async function updateFile(newContent, sha, message) {
        const res = await fetch(`https://api.github.com/repos/${owner}/${repo}/contents/${path}`, {
            method: "PUT",
            headers: {
                Authorization: `token ${getToken()}`,
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                message: message || "Ajout d'une entrée via l'interface web",
                content: btoa(unescape(encodeURIComponent(JSON.stringify(newContent, null, 2)))),
                sha: sha,
                branch: branch
            })
        });
        if (!res.ok) {
            const err = await res.text();
            throw new Error("Erreur lors de la mise à jour du fichier JSON : " + err);
        }
        return res.json();
    }

    function isDuplicate(items, song, artist) {
        const normalize = s => s.trim().toLowerCase();
        return items.some(item =>
            normalize(item.song) === normalize(song) &&
            normalize(item.artist) === normalize(artist)
        );
    }

    async function addEntry(song, artist, url) {
        const { content, sha } = await getFile();
        if (isDuplicate(content.items, song, artist)) {
            throw new Error("DUPLICATE");
        }
        content.items.push({ song, artist, url });
        await updateFile(content, sha, `Ajout: ${song} - ${artist}`);
    }

    // ---------- Catbox uploads ----------

    async function uploadCatboxFile(file) {
        const formData = new FormData();
        formData.append("reqtype", "fileupload");
        formData.append("fileToUpload", file);

        const response = await fetch(CORS_PROXY + "https://catbox.moe/user/api.php", {
            method: "POST",
            body: formData
        });

        if (!response.ok) throw new Error("Erreur lors de l'upload sur Catbox (status " + response.status + ")");

        const url = await response.text();
        if (!url.startsWith("http")) throw new Error("Réponse Catbox invalide : " + url);
        return url.trim();
    }

    async function uploadCatboxByUrl(sourceUrl) {
        const formData = new FormData();
        formData.append("reqtype", "urlupload");
        formData.append("url", sourceUrl);

        const response = await fetch(CORS_PROXY + "https://catbox.moe/user/api.php", {
            method: "POST",
            body: formData
        });

        if (!response.ok) throw new Error("Erreur lors de l'upload sur Catbox (status " + response.status + ")");

        const url = await response.text();
        if (!url.startsWith("http")) throw new Error("Réponse Catbox invalide : " + url);
        return url.trim();
    }

    // ---------- Manual add ----------

    async function submitEntry() {
        const song = document.getElementById("song").value.trim();
        const artist = document.getElementById("artist").value.trim();
        let url = document.getElementById("url").value.trim();
        const file = document.getElementById("fileInput").files[0];
        const status = document.getElementById("status");

        if (!song || !artist) {
            status.textContent = "Titre et artiste sont requis.";
            return;
        }

        try {
            if (file) {
                status.textContent = "Upload du fichier en cours...";
                url = await uploadCatboxFile(file);
            }

            if (!url) {
                status.textContent = "Il faut une URL ou un fichier.";
                return;
            }

            status.textContent = "Ajout de l'entrée au JSON...";
            await addEntry(song, artist, url);

            status.textContent = "Ajouté avec succès !";
            document.getElementById("song").value = "";
            document.getElementById("artist").value = "";
            document.getElementById("url").value = "";
            document.getElementById("fileInput").value = "";
        } catch (err) {
            if (err.message === "DUPLICATE") {
                status.textContent = "Cette chanson existe déjà dans la bibliothèque.";
            } else {
                status.textContent = "Erreur : " + err.message;
            }
            console.error(err);
        }
    }

    // ---------- Addon (Eclipse) integration ----------

    async function loadManifest() {
        const manifestStatus = document.getElementById("manifestStatus");
        let url = document.getElementById("manifestUrl").value.trim();

        if (!url) {
            manifestStatus.textContent = "Entre une URL de manifest.";
            return;
        }

        try {
            manifestStatus.textContent = "Chargement...";

            addonBaseUrl = url.replace(/\/manifest\.json\/?$/, "");

            const res = await fetch(CORS_PROXY + url);
            if (!res.ok) throw new Error("Impossible de charger le manifest (status " + res.status + ")");
            const manifest = await res.json();

            localStorage.setItem(LS_MANIFEST_KEY, url);

            manifestStatus.textContent = `Addon chargé : ${manifest.name} (v${manifest.version})`;
        } catch (err) {
            manifestStatus.textContent = "Erreur : " + err.message;
            console.error(err);
        }
    }

    async function searchAddon() {
        const query = document.getElementById("searchQuery").value.trim();
        const resultsDiv = document.getElementById("searchResults");
        resultsDiv.innerHTML = "";

        if (!addonBaseUrl) {
            alert("Charge d'abord un addon.");
            return;
        }
        if (!query) return;

        try {
            const res = await fetch(CORS_PROXY + `${addonBaseUrl}/search?q=${encodeURIComponent(query)}`);
            if (!res.ok) throw new Error("Erreur de recherche (status " + res.status + ")");
            const data = await res.json();

            const tracks = data.tracks || [];
            if (tracks.length === 0) {
                resultsDiv.innerHTML = "<p>Aucun résultat.</p>";
                return;
            }

            tracks.forEach(track => {
                const div = document.createElement("div");
                div.style = "margin-bottom:10px; padding:8px; border:1px solid #ccc;";
                div.innerHTML = `
                    <strong>${track.title}</strong> - ${track.artist}
                    ${track.album ? " (" + track.album + ")" : ""}
                    <br>
                    <button data-id="${track.id}" data-title="${encodeURIComponent(track.title)}" data-artist="${encodeURIComponent(track.artist)}" onclick="autoAdd(this)">
                        Ajouter automatiquement
                    </button>
                `;
                resultsDiv.appendChild(div);
            });
        } catch (err) {
            resultsDiv.innerHTML = "<p>Erreur : " + err.message + "</p>";
            console.error(err);
        }
    }

    async function autoAdd(button) {
        const id = button.getAttribute("data-id");
        const title = decodeURIComponent(button.getAttribute("data-title"));
        const artist = decodeURIComponent(button.getAttribute("data-artist"));
        const autoStatus = document.getElementById("autoStatus");

        try {
            autoStatus.textContent = "Résolution du stream...";

            const res = await fetch(CORS_PROXY + `${addonBaseUrl}/stream/${encodeURIComponent(id)}`);
            if (!res.ok) throw new Error("Erreur lors de la résolution du stream (status " + res.status + ")");
            const streamData = await res.json();

            if (!streamData.url) throw new Error("Pas d'URL de stream retournée.");

            autoStatus.textContent = "Upload sur Catbox par URL...";
            const catboxUrl = await uploadCatboxByUrl(streamData.url);

            autoStatus.textContent = "Ajout au JSON...";
            await addEntry(title, artist, catboxUrl);

            autoStatus.textContent = `Ajouté avec succès : ${title} - ${artist}`;
        } catch (err) {
            if (err.message === "DUPLICATE") {
                autoStatus.textContent = "Cette chanson existe déjà dans la bibliothèque.";
            } else {
                autoStatus.textContent = "Erreur : " + err.message;
            }
            console.error(err);
        }
    }

    // ---------- Bulk CSV import ----------

    function parseVibesCSV(text) {
        // Format: blocs "Title: ...\nArtist: ...\nAlbum: ...\nDuration: ...\nURL: ..." collés ensemble
        const entries = [];
        const regex = /Title:\s*(.*?)\s*Artist:\s*(.*?)\s*Album:\s*(.*?)\s*Duration:\s*(\d+)\s*URL:\s*(https?:\/\/\S+)/gs;

        let match;
        while ((match = regex.exec(text)) !== null) {
            entries.push({
                title: match[1].trim(),
                artist: match[2].trim(),
                album: match[3].trim(),
                duration: parseInt(match[4], 10),
                url: match[5].trim()
            });
        }
        return entries;
    }

    function updateProgressBar(current, total) {
        const percent = total === 0 ? 0 : Math.round((current / total) * 100);
        document.getElementById("progressBar").style.width = percent + "%";
        document.getElementById("bulkStatus").textContent = `${current} / ${total} traité(s) (${percent}%)`;
    }

    function logBulk(message) {
        const li = document.createElement("li");
        li.textContent = message;
        document.getElementById("bulkLog").appendChild(li);
    }

    function cancelBulkImport() {
        bulkImportCancelled = true;
        document.getElementById("cancelBtn").disabled = true;
        logBulk("⏹️ Annulation demandée...");
    }

    async function startBulkImport() {
        const fileInput = document.getElementById("csvFile");
        const file = fileInput.files[0];
        const bulkLog = document.getElementById("bulkLog");
        bulkLog.innerHTML = "";
        document.getElementById("progressBar").style.width = "0%";

        if (!file) {
            alert("Sélectionne un fichier CSV d'abord.");
            return;
        }

        const text = await file.text();
        const entries = parseVibesCSV(text);

        if (entries.length === 0) {
            alert("Aucune entrée détectée dans le fichier. Vérifie le format.");
            return;
        }

        bulkImportCancelled = false;
        document.getElementById("cancelBtn").disabled = false;

        try {
            // On charge le fichier JSON UNE fois, et on le garde en mémoire tout le long
            // pour éviter de refaire un GET à chaque itération et minimiser les conflits de SHA.
            let { content, sha } = await getFile();

            let addedCount = 0;
            let skippedCount = 0;
            let errorCount = 0;

            for (let i = 0; i < entries.length; i++) {
                if (bulkImportCancelled) {
                    logBulk(`⏹️ Import annulé après ${i} entrée(s) traitée(s).`);
                    break;
                }

                const entry = entries[i];
                updateProgressBar(i, entries.length);

                if (isDuplicate(content.items, entry.title, entry.artist)) {
                    logBulk(`⏭️ Ignoré (doublon) : ${entry.title} - ${entry.artist}`);
                    skippedCount++;
                    continue;
                }

                try {
                    content.items.push({
                        song: entry.title,
                        artist: entry.artist,
                        url: entry.url
                    });

                    const result = await updateFile(content, sha, `Import CSV: ${entry.title} - ${entry.artist}`);
                    sha = result.content.sha; // met à jour le SHA pour la prochaine itération

                    logBulk(`✅ Ajouté : ${entry.title} - ${entry.artist}`);
                    addedCount++;
                } catch (err) {
                    logBulk(`❌ Erreur pour "${entry.title} - ${entry.artist}" : ${err.message}`);
                    errorCount++;
                    // On enlève l'entrée du contenu local si l'upload a échoué, pour rester cohérent
                    content.items.pop();
                }
            }

            updateProgressBar(entries.length, entries.length);
            if (!bulkImportCancelled) {
                logBulk(`🎉 Terminé. ${addedCount} ajoutée(s), ${skippedCount} doublon(s) ignoré(s), ${errorCount} erreur(s).`);
            }
        } catch (err) {
            logBulk("❌ Erreur fatale : " + err.message);
            console.error(err);
        } finally {
            document.getElementById("cancelBtn").disabled = true;
        }
    }
</script>

</body>
</html>
