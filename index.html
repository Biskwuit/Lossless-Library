<!DOCTYPE html>
<html>
<head>
    <title>Gestionnaire de chansons</title>
</head>
<body>

    <h1>Ajouter une chanson au JSON</h1>

    <label>Titre de la chanson :</label><br>
    <input type="text" id="song"><br><br>

    <label>Artiste :</label><br>
    <input type="text" id="artist"><br><br>

    <label>Fichier FLAC :</label><br>
    <input type="file" id="fileInput" accept=".flac"><br><br>

    <button onclick="ajouterEntree()">Send</button>

    <p id="status"></p>

    <hr>

    <h2>Liste des chansons</h2>
    <button onclick="chargerListe()">🔄 Rafraîchir la liste</button>
    <div id="liste"></div>

    <script>
        // Configuration du repo
        const owner = "Biskwuit";
        const repo = "Lossless-Library";
        const path = "music.json";
        const branch = "main";

        let token = prompt("Entre ton GitHub Personal Access Token :");

        // Upload le fichier sur Catbox et retourne l'URL
        async function uploadCatbox(file) {
            const formData = new FormData();
            formData.append("reqtype", "fileupload");
            formData.append("fileToUpload", file);

            const response = await fetch("https://catbox.moe/user/api.php", {
                method: "POST",
                body: formData
            });

            if (!response.ok) {
                throw new Error("Erreur lors de l'upload sur Catbox");
            }

            const url = await response.text();

            if (!url.startsWith("http")) {
                throw new Error("Réponse Catbox invalide : " + url);
            }

            return url.trim();
        }

        // Charge le JSON et retourne { data, sha }
        async function getFichier() {
            const response = await fetch(
                `https://api.github.com/repos/${owner}/${repo}/contents/${path}?ref=${branch}`,
                {
                    headers: {
                        "Authorization": `token ${token}`,
                        "Accept": "application/vnd.github.v3+json"
                    }
                }
            );

            if (!response.ok) {
                throw new Error("Erreur lors de la récupération du fichier");
            }

            const fileData = await response.json();
            const content = decodeURIComponent(escape(atob(fileData.content)));
            const jsonData = JSON.parse(content);

            return { data: jsonData, sha: fileData.sha };
        }

        // Envoie le nouveau JSON sur GitHub
        async function sauvegarderFichier(jsonData, sha, message) {
            const newContent = btoa(unescape(encodeURIComponent(JSON.stringify(jsonData, null, 2))));

            const response = await fetch(
                `https://api.github.com/repos/${owner}/${repo}/contents/${path}`,
                {
                    method: "PUT",
                    headers: {
                        "Authorization": `token ${token}`,
                        "Accept": "application/vnd.github.v3+json",
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        message: message,
                        content: newContent,
                        sha: sha,
                        branch: branch
                    })
                }
            );

            if (!response.ok) {
                const errorData = await response.json();
                throw new Error(errorData.message || "Erreur lors de l'envoi");
            }
        }

        // Ajoute une entrée (avec upload du fichier)
        async function ajouterEntree() {
            const song = document.getElementById("song").value;
            const artist = document.getElementById("artist").value;
            const fileInput = document.getElementById("fileInput");
            const file = fileInput.files[0];

            if (!song || !artist || !file) {
                document.getElementById("status").innerText = "Remplis tous les champs et choisis un fichier !";
                return;
            }

            try {
                document.getElementById("status").innerText = "⬆️ Upload du fichier sur Catbox...";
                const url = await uploadCatbox(file);

                document.getElementById("status").innerText = "💾 Mise à jour du JSON...";
                const { data, sha } = await getFichier();

                data.items.push({ song, artist, url });

                await sauvegarderFichier(data, sha, `Ajout de "${song}" par ${artist}`);

                document.getElementById("status").innerText = "✅ Ajouté avec succès !";
                document.getElementById("song").value = "";
                document.getElementById("artist").value = "";
                fileInput.value = "";

                chargerListe();

            } catch (error) {
                document.getElementById("status").innerText = "❌ Erreur : " + error.message;
                console.error(error);
            }
        }

        // Supprime une entrée par son index
        async function supprimerEntree(index) {
            if (!confirm("Supprimer cette chanson ?")) return;

            document.getElementById("status").innerText = "Suppression...";

            try {
                const { data, sha } = await getFichier();

                const suppr = data.items[index];
                data.items.splice(index, 1);

                await sauvegarderFichier(data, sha, `Suppression de "${suppr.song}"`);

                document.getElementById("status").innerText = "✅ Supprimé avec succès !";
                chargerListe();

            } catch (error) {
                document.getElementById("status").innerText = "❌ Erreur : " + error.message;
                console.error(error);
            }
        }

        // Affiche la liste des chansons
        async function chargerListe() {
            document.getElementById("liste").innerHTML = "Chargement...";

            try {
                const { data } = await getFichier();

                if (data.items.length === 0) {
                    document.getElementById("liste").innerHTML = "Aucune chanson.";
                    return;
                }

                let html = "";
                data.items.forEach((item, index) => {
                    html += `
                        <p>
                            <b>${item.song}</b> - ${item.artist}<br>
                            <a href="${item.url}" target="_blank">${item.url}</a><br>
                            <button onclick="supprimerEntree(${index})">🗑️ Supprimer</button>
                        </p>
                        <hr>
                    `;
                });

                document.getElementById("liste").innerHTML = html;

            } catch (error) {
                document.getElementById("liste").innerHTML = "❌ Erreur : " + error.message;
                console.error(error);
            }
        }

        chargerListe();
    </script>

</body>
</html>
