<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Lossless Library Editor</title>
</head>
<body>

<h1>Ajouter une musique</h1>

<h2>1. Ajout manuel</h2>
<label>Titre : <input id="song" type="text"></label><br><br>
<label>Artiste : <input id="artist" type="text"></label><br><br>
<label>URL FLAC : <input id="url" type="text"></label><br><br>
<label>Ou upload fichier FLAC : <input id="fileInput" type="file" accept=".flac"></label><br><br>
<button onclick="submitEntry()">Send</button>

<p id="status"></p>

<hr>

<h2>2. Auto-download via addon Eclipse</h2>
<label>URL du manifest.json de l'addon : <input id="manifestUrl" type="text" size="60" placeholder="https://mon-addon.com/manifest.json"></label>
<button onclick="loadManifest()">Charger l'addon</button>
<p id="manifestStatus"></p>

<br>
<label>Recherche : <input id="searchQuery" type="text"></label>
<button onclick="searchAddon()">Chercher</button>

<div id="searchResults"></div>

<p id="autoStatus"></p>

<script>
    const owner = "Biskwuit";
    const repo = "Lossless-Library";
    const path = "music.json";
    const branch = "main";

    const CORS_PROXY = "https://cors.zizicabane.stream/";

    let githubToken = "";
    let addonBaseUrl = "";

    function getToken() {
        if (!githubToken) {
            githubToken = prompt("Entre ton GitHub Personal Access Token :");
        }
        return githubToken;
    }

    // ---------- GitHub JSON helpers ----------

    async function getFile() {
        const res = await fetch(`https://api.github.com/repos/${owner}/${repo}/contents/${path}?ref=${branch}`, {
            headers: { Authorization: `token ${getToken()}` }
        });
        if (!res.ok) throw new Error("Erreur lors de la lecture du fichier JSON");
        const data = await res.json();
        const content = JSON.parse(atob(data.content));
        return { content, sha: data.sha };
    }

    async function updateFile(newContent, sha, message) {
        const res = await fetch(`https://api.github.com/repos/${owner}/${repo}/contents/${path}`, {
            method: "PUT",
            headers: {
                Authorization: `token ${getToken()}`,
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                message: message || "Ajout d'une entrée via l'interface web",
                content: btoa(unescape(encodeURIComponent(JSON.stringify(newContent, null, 2)))),
                sha: sha,
                branch: branch
            })
        });
        if (!res.ok) {
            const err = await res.text();
            throw new Error("Erreur lors de la mise à jour du fichier JSON : " + err);
        }
        return res.json();
    }

    async function addEntry(song, artist, url) {
        const { content, sha } = await getFile();
        content.items.push({ song, artist, url });
        await updateFile(content, sha, `Ajout: ${song} - ${artist}`);
    }

    // ---------- Catbox uploads ----------

    async function uploadCatboxFile(file) {
        const formData = new FormData();
        formData.append("reqtype", "fileupload");
        formData.append("fileToUpload", file);

        const response = await fetch(CORS_PROXY + "https://catbox.moe/user/api.php", {
            method: "POST",
            body: formData
        });

        if (!response.ok) throw new Error("Erreur lors de l'upload sur Catbox (status " + response.status + ")");

        const url = await response.text();
        if (!url.startsWith("http")) throw new Error("Réponse Catbox invalide : " + url);
        return url.trim();
    }

    async function uploadCatboxByUrl(sourceUrl) {
        const formData = new FormData();
        formData.append("reqtype", "urlupload");
        formData.append("url", sourceUrl);

        const response = await fetch(CORS_PROXY + "https://catbox.moe/user/api.php", {
            method: "POST",
            body: formData
        });

        if (!response.ok) throw new Error("Erreur lors de l'upload sur Catbox (status " + response.status + ")");

        const url = await response.text();
        if (!url.startsWith("http")) throw new Error("Réponse Catbox invalide : " + url);
        return url.trim();
    }

    // ---------- Manual add ----------

    async function submitEntry() {
        const song = document.getElementById("song").value.trim();
        const artist = document.getElementById("artist").value.trim();
        let url = document.getElementById("url").value.trim();
        const file = document.getElementById("fileInput").files[0];
        const status = document.getElementById("status");

        if (!song || !artist) {
            status.textContent = "Titre et artiste sont requis.";
            return;
        }

        try {
            if (file) {
                status.textContent = "Upload du fichier en cours...";
                url = await uploadCatboxFile(file);
            }

            if (!url) {
                status.textContent = "Il faut une URL ou un fichier.";
                return;
            }

            status.textContent = "Ajout de l'entrée au JSON...";
            await addEntry(song, artist, url);

            status.textContent = "Ajouté avec succès !";
            document.getElementById("song").value = "";
            document.getElementById("artist").value = "";
            document.getElementById("url").value = "";
            document.getElementById("fileInput").value = "";
        } catch (err) {
            status.textContent = "Erreur : " + err.message;
            console.error(err);
        }
    }

    // ---------- Addon (Eclipse) integration ----------

    async function loadManifest() {
        const manifestStatus = document.getElementById("manifestStatus");
        let url = document.getElementById("manifestUrl").value.trim();

        if (!url) {
            manifestStatus.textContent = "Entre une URL de manifest.";
            return;
        }

        try {
            manifestStatus.textContent = "Chargement...";

            // On dérive la base URL en retirant /manifest.json à la fin
            addonBaseUrl = url.replace(/\/manifest\.json\/?$/, "");

            const res = await fetch(CORS_PROXY + url);
            if (!res.ok) throw new Error("Impossible de charger le manifest (status " + res.status + ")");
            const manifest = await res.json();

            manifestStatus.textContent = `Addon chargé : ${manifest.name} (v${manifest.version})`;
        } catch (err) {
            manifestStatus.textContent = "Erreur : " + err.message;
            console.error(err);
        }
    }

    async function searchAddon() {
        const query = document.getElementById("searchQuery").value.trim();
        const resultsDiv = document.getElementById("searchResults");
        resultsDiv.innerHTML = "";

        if (!addonBaseUrl) {
            alert("Charge d'abord un addon.");
            return;
        }
        if (!query) return;

        try {
            const res = await fetch(CORS_PROXY + `${addonBaseUrl}/search?q=${encodeURIComponent(query)}`);
            if (!res.ok) throw new Error("Erreur de recherche (status " + res.status + ")");
            const data = await res.json();

            const tracks = data.tracks || [];
            if (tracks.length === 0) {
                resultsDiv.innerHTML = "<p>Aucun résultat.</p>";
                return;
            }

            tracks.forEach(track => {
                const div = document.createElement("div");
                div.style = "margin-bottom:10px; padding:8px; border:1px solid #ccc;";
                div.innerHTML = `
                    <strong>${track.title}</strong> - ${track.artist}
                    ${track.album ? " (" + track.album + ")" : ""}
                    <br>
                    <button data-id="${track.id}" data-title="${encodeURIComponent(track.title)}" data-artist="${encodeURIComponent(track.artist)}" onclick="autoAdd(this)">
                        Ajouter automatiquement
                    </button>
                `;
                resultsDiv.appendChild(div);
            });
        } catch (err) {
            resultsDiv.innerHTML = "<p>Erreur : " + err.message + "</p>";
            console.error(err);
        }
    }

    async function autoAdd(button) {
        const id = button.getAttribute("data-id");
        const title = decodeURIComponent(button.getAttribute("data-title"));
        const artist = decodeURIComponent(button.getAttribute("data-artist"));
        const autoStatus = document.getElementById("autoStatus");

        try {
            autoStatus.textContent = "Résolution du stream...";

            const res = await fetch(CORS_PROXY + `${addonBaseUrl}/stream/${encodeURIComponent(id)}`);
            if (!res.ok) throw new Error("Erreur lors de la résolution du stream (status " + res.status + ")");
            const streamData = await res.json();

            if (!streamData.url) throw new Error("Pas d'URL de stream retournée.");

            autoStatus.textContent = "Upload sur Catbox par URL...";
            const catboxUrl = await uploadCatboxByUrl(streamData.url);

            autoStatus.textContent = "Ajout au JSON...";
            await addEntry(title, artist, catboxUrl);

            autoStatus.textContent = `Ajouté avec succès : ${title} - ${artist}`;
        } catch (err) {
            autoStatus.textContent = "Erreur : " + err.message;
            console.error(err);
        }
    }
</script>

</body>
</html>
