<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Lossless Library Editor</title>
</head>
<body>

<h1>Lossless Library Editor</h1>

<h2>Paramètres</h2>
<button onclick="clearSavedSettings()">🗑️ Effacer token GitHub + URL manifest sauvegardés</button>
<p id="settingsStatus"></p>

<hr>

<h2>1. Ajout manuel</h2>
<label>Titre : <input id="song" type="text"></label><br><br>
<label>Artiste : <input id="artist" type="text"></label><br><br>
<label>URL FLAC : <input id="url" type="text"></label><br><br>
<label>Ou upload fichier FLAC : <input id="fileInput" type="file" accept=".flac"></label><br><br>
<button onclick="submitEntry()">Send</button>

<p id="status"></p>

<hr>

<h2>2. Auto-download via addon Eclipse</h2>
<label>URL du manifest.json de l'addon : <input id="manifestUrl" type="text" size="60" placeholder="https://mon-addon.com/manifest.json"></label>
<button onclick="loadManifest()">Charger l'addon</button>
<p id="manifestStatus"></p>

<br>
<label>Recherche : <input id="searchQuery" type="text"></label>
<button onclick="searchAddon()">Chercher</button>

<div id="searchResults"></div>

<p id="autoStatus"></p>

<hr>

<h2>3. Bulk import depuis CSV</h2>
<p>Format attendu : <code>Title,Artist,Album,Duration,URL</code> (nécessite l'addon chargé ci-dessus)</p>
<input id="csvFile" type="file" accept=".csv">
<button onclick="startBulkImport()">Importer</button>
<button onclick="cancelBulkImport()" id="cancelBtn" style="display:none;">❌ Annuler</button>

<div id="bulkProgressWrapper" style="display:none; margin-top:10px;">
    <progress id="bulkProgress" value="0" max="100" style="width:300px;"></progress>
    <span id="bulkProgressText"></span>
</div>

<div id="bulkLog" style="margin-top:10px; max-height:300px; overflow-y:auto; border:1px solid #ccc; padding:5px;"></div>

<script>
    const owner = "Biskwuit";
    const repo = "Lossless-Library";
    const path = "music.json";
    const branch = "main";

    const CORS_PROXY = "https://cors.zizicabane.stream/";

    const LS_TOKEN_KEY = "eclipse_github_token";
    const LS_MANIFEST_KEY = "eclipse_manifest_url";

    let githubToken = localStorage.getItem(LS_TOKEN_KEY) || "";
    let addonBaseUrl = "";
    let bulkCancelled = false;

    // ---------- Init ----------

    window.addEventListener("DOMContentLoaded", () => {
        const savedManifestUrl = localStorage.getItem(LS_MANIFEST_KEY);
        if (savedManifestUrl) {
            document.getElementById("manifestUrl").value = savedManifestUrl;
            addonBaseUrl = savedManifestUrl.replace(/\/manifest\.json\/?$/, "");
            document.getElementById("manifestStatus").textContent = "URL restaurée depuis le cache local. Clique sur 'Charger l'addon' pour vérifier.";
        }
    });

    // ---------- Token / settings ----------

    function getToken() {
        if (!githubToken) {
            githubToken = prompt("Entre ton GitHub Personal Access Token :");
            if (githubToken) {
                localStorage.setItem(LS_TOKEN_KEY, githubToken);
            }
        }
        return githubToken;
    }

    function clearSavedSettings() {
        localStorage.removeItem(LS_TOKEN_KEY);
        localStorage.removeItem(LS_MANIFEST_KEY);
        githubToken = "";
        addonBaseUrl = "";
        document.getElementById("manifestUrl").value = "";
        document.getElementById("settingsStatus").textContent = "Token et URL manifest effacés du cache local.";
    }

    // ---------- GitHub helpers ----------

    async function getFileData() {
        const token = getToken();
        const res = await fetch(`https://api.github.com/repos/${owner}/${repo}/contents/${path}?ref=${branch}`, {
            headers: { Authorization: `token ${token}` }
        });
        if (!res.ok) throw new Error("Erreur lors de la lecture du fichier JSON (status " + res.status + ")");
        const data = await res.json();
        const content = decodeURIComponent(escape(atob(data.content)));
        return { json: JSON.parse(content), sha: data.sha };
    }

    async function saveFileData(json, sha, commitMessage) {
        const token = getToken();
        const content = btoa(unescape(encodeURIComponent(JSON.stringify(json, null, 2))));
        const res = await fetch(`https://api.github.com/repos/${owner}/${repo}/contents/${path}`, {
            method: "PUT",
            headers: {
                Authorization: `token ${token}`,
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                message: commitMessage || "Ajout d'une musique",
                content: content,
                sha: sha,
                branch: branch
            })
        });
        if (!res.ok) {
            const errText = await res.text();
            throw new Error("Erreur lors de l'écriture du fichier JSON : " + errText);
        }
        return res.json();
    }

    function isDuplicate(json, title, artist) {
        return json.items.some(item =>
            item.song.trim().toLowerCase() === title.trim().toLowerCase() &&
            item.artist.trim().toLowerCase() === artist.trim().toLowerCase()
        );
    }

    async function addEntry(title, artist, fileUrl) {
        const { json, sha } = await getFileData();

        if (isDuplicate(json, title, artist)) {
            throw new Error(`Doublon ignoré : "${title}" - "${artist}" existe déjà.`);
        }

        json.items.push({
            song: title,
            artist: artist,
            url: fileUrl
        });

        await saveFileData(json, sha, `Ajout : ${title} - ${artist}`);
    }

    // ---------- Catbox uploads ----------

    async function uploadCatboxFile(file) {
        const formData = new FormData();
        formData.append("reqtype", "fileupload");
        formData.append("fileToUpload", file);

        const res = await fetch(CORS_PROXY + "https://catbox.moe/user/api.php", {
            method: "POST",
            body: formData
        });

        if (!res.ok) throw new Error("Erreur lors de l'upload sur Catbox (status " + res.status + ")");
        const text = await res.text();
        if (!text.startsWith("http")) throw new Error("Réponse inattendue de Catbox : " + text);
        return text.trim();
    }

    async function uploadCatboxByUrl(url) {
        const formData = new FormData();
        formData.append("reqtype", "urlupload");
        formData.append("url", url);

        const res = await fetch(CORS_PROXY + "https://catbox.moe/user/api.php", {
            method: "POST",
            body: formData
        });

        if (!res.ok) throw new Error("Erreur lors de l'upload par URL sur Catbox (status " + res.status + ")");
        const text = await res.text();
        if (!text.startsWith("http")) throw new Error("Réponse inattendue de Catbox : " + text);
        return text.trim();
    }

    // ---------- Ajout manuel ----------

    async function submitEntry() {
        const status = document.getElementById("status");
        const title = document.getElementById("song").value.trim();
        const artist = document.getElementById("artist").value.trim();
        let fileUrl = document.getElementById("url").value.trim();
        const fileInput = document.getElementById("fileInput");

        if (!title || !artist) {
            status.textContent = "Titre et artiste requis.";
            return;
        }

        try {
            if (fileInput.files.length > 0) {
                status.textContent = "Upload du fichier sur Catbox...";
                fileUrl = await uploadCatboxFile(fileInput.files[0]);
            }

            if (!fileUrl) {
                status.textContent = "Aucune URL ni fichier fourni.";
                return;
            }

            status.textContent = "Ajout au JSON...";
            await addEntry(title, artist, fileUrl);

            status.textContent = `Ajouté avec succès : ${title} - ${artist}`;
            document.getElementById("song").value = "";
            document.getElementById("artist").value = "";
            document.getElementById("url").value = "";
            fileInput.value = "";
        } catch (err) {
            status.textContent = "Erreur : " + err.message;
            console.error(err);
        }
    }

    // ---------- Addon Eclipse ----------

    async function loadManifest() {
        const manifestStatus = document.getElementById("manifestStatus");
        const manifestUrlInput = document.getElementById("manifestUrl").value.trim();

        if (!manifestUrlInput) {
            manifestStatus.textContent = "Merci d'entrer une URL de manifest.";
            return;
        }

        try {
            manifestStatus.textContent = "Chargement du manifest...";
            const res = await fetch(CORS_PROXY + manifestUrlInput);
            if (!res.ok) throw new Error("Impossible de charger le manifest (status " + res.status + ")");
            const manifest = await res.json();

            addonBaseUrl = manifestUrlInput.replace(/\/manifest\.json\/?$/, "");
            localStorage.setItem(LS_MANIFEST_KEY, manifestUrlInput);

            manifestStatus.textContent = `Addon chargé : ${manifest.name} (v${manifest.version})`;
        } catch (err) {
            manifestStatus.textContent = "Erreur : " + err.message;
            console.error(err);
        }
    }

    async function searchAddon() {
        const resultsDiv = document.getElementById("searchResults");
        const query = document.getElementById("searchQuery").value.trim();

        if (!addonBaseUrl) {
            resultsDiv.innerHTML = "<p>Charge d'abord un addon.</p>";
            return;
        }
        if (!query) {
            resultsDiv.innerHTML = "<p>Entre une recherche.</p>";
            return;
        }

        resultsDiv.innerHTML = "<p>Recherche en cours...</p>";

        try {
            const res = await fetch(CORS_PROXY + `${addonBaseUrl}/search?q=${encodeURIComponent(query)}`);
            if (!res.ok) throw new Error("Erreur lors de la recherche (status " + res.status + ")");
            const data = await res.json();

            const tracks = data.tracks || [];
            if (tracks.length === 0) {
                resultsDiv.innerHTML = "<p>Aucun résultat.</p>";
                return;
            }

            resultsDiv.innerHTML = tracks.map(t => `
                <div style="border:1px solid #ccc; padding:5px; margin:5px 0;">
                    <strong>${t.title}</strong> - ${t.artist} ${t.format ? "[" + t.format + "]" : ""}
                    <button
                        data-id="${encodeURIComponent(t.id)}"
                        data-title="${encodeURIComponent(t.title)}"
                        data-artist="${encodeURIComponent(t.artist)}"
                        onclick="autoAdd(this)">
                        Ajouter
                    </button>
                </div>
            `).join("");
        } catch (err) {
            resultsDiv.innerHTML = "<p>Erreur : " + err.message + "</p>";
            console.error(err);
        }
    }

    async function resolveStreamUrl(trackId) {
        const res = await fetch(CORS_PROXY + `${addonBaseUrl}/stream/${encodeURIComponent(trackId)}`);
        if (!res.ok) throw new Error("Erreur lors de la résolution du stream (status " + res.status + ")");
        const streamData = await res.json();
        if (!streamData.url) throw new Error("Pas d'URL de stream retournée.");
        return streamData.url;
    }

    async function autoAdd(button) {
        const id = decodeURIComponent(button.getAttribute("data-id"));
        const title = decodeURIComponent(button.getAttribute("data-title"));
        const artist = decodeURIComponent(button.getAttribute("data-artist"));
        const autoStatus = document.getElementById("autoStatus");

        try {
            autoStatus.textContent = "Résolution du stream...";
            const streamUrl = await resolveStreamUrl(id);

            autoStatus.textContent = "Upload sur Catbox par URL...";
            const catboxUrl = await uploadCatboxByUrl(streamUrl);

            autoStatus.textContent = "Ajout au JSON...";
            await addEntry(title, artist, catboxUrl);

            autoStatus.textContent = `Ajouté avec succès : ${title} - ${artist}`;
        } catch (err) {
            autoStatus.textContent = "Erreur : " + err.message;
            console.error(err);
        }
    }

    // ---------- Bulk import CSV ----------

    function parseCSV(text) {
        const lines = text.split(/\r?\n/).filter(l => l.trim().length > 0);
        const headers = splitCSVLine(lines[0]);
        const rows = [];

        for (let i = 1; i < lines.length; i++) {
            const values = splitCSVLine(lines[i]);
            if (values.length === 1 && values[0] === "") continue;
            const row = {};
            headers.forEach((h, idx) => {
                row[h.trim()] = (values[idx] || "").trim();
            });
            rows.push(row);
        }
        return rows;
    }

    function splitCSVLine(line) {
        const result = [];
        let current = "";
        let inQuotes = false;

        for (let i = 0; i < line.length; i++) {
            const char = line[i];

            if (inQuotes) {
                if (char === '"') {
                    if (line[i + 1] === '"') {
                        current += '"';
                        i++;
                    } else {
                        inQuotes = false;
                    }
                } else {
                    current += char;
                }
            } else {
                if (char === '"') {
                    inQuotes = true;
                } else if (char === ",") {
                    result.push(current);
                    current = "";
                } else {
                    current += char;
                }
            }
        }
        result.push(current);
        return result;
    }

    function logBulk(message) {
        const log = document.getElementById("bulkLog");
        const line = document.createElement("div");
        line.textContent = message;
        log.appendChild(line);
        log.scrollTop = log.scrollHeight;
    }

    function updateBulkProgress(current, total) {
        const progress = document.getElementById("bulkProgress");
        const text = document.getElementById("bulkProgressText");
        const percent = Math.round((current / total) * 100);
        progress.value = percent;
        text.textContent = `${current} / ${total} (${percent}%)`;
    }

    function cancelBulkImport() {
        bulkCancelled = true;
        logBulk("⚠️ Annulation demandée...");
    }

    async function startBulkImport() {
        const fileInput = document.getElementById("csvFile");
        const bulkLog = document.getElementById("bulkLog");
        const progressWrapper = document.getElementById("bulkProgressWrapper");
        const cancelBtn = document.getElementById("cancelBtn");

        bulkLog.innerHTML = "";
        bulkCancelled = false;

        if (!addonBaseUrl) {
            logBulk("❌ Charge d'abord un addon Eclipse (section 2).");
            return;
        }

        if (fileInput.files.length === 0) {
            logBulk("❌ Merci de sélectionner un fichier CSV.");
            return;
        }

        const file = fileInput.files[0];
        const text = await file.text();
        const rows = parseCSV(text);

        if (rows.length === 0) {
            logBulk("❌ Aucune ligne trouvée dans le CSV.");
            return;
        }

        progressWrapper.style.display = "block";
        cancelBtn.style.display = "inline-block";
        updateBulkProgress(0, rows.length);

        logBulk(`Import de ${rows.length} musiques...`);

        // On récupère le JSON une seule fois au début pour vérifier les doublons localement,
        // mais on relit/réécrit à chaque ajout pour éviter les conflits de sha.
        let processed = 0;
        let added = 0;
        let skipped = 0;
        let failed = 0;

        for (const row of rows) {
            if (bulkCancelled) {
                logBulk("🛑 Import annulé par l'utilisateur.");
                break;
            }

            const title = (row["Title"] || "").trim();
            const artist = (row["Artist"] || "").trim();
            const sourceUrl = (row["URL"] || "").trim();

            processed++;

            if (!title || !artist) {
                logBulk(`⚠️ Ligne ignorée (titre/artiste manquant) : ${JSON.stringify(row)}`);
                skipped++;
                updateBulkProgress(processed, rows.length);
                continue;
            }

            try {
                // Vérification anti-doublon avant de faire tout le travail
                const { json } = await getFileData();
                if (isDuplicate(json, title, artist)) {
                    logBulk(`⏭️ Doublon ignoré : "${title}" - "${artist}"`);
                    skipped++;
                    updateBulkProgress(processed, rows.length);
                    continue;
                }

                logBulk(`🔎 Recherche de "${title}" - "${artist}"...`);
                const searchRes = await fetch(CORS_PROXY + `${addonBaseUrl}/search?q=${encodeURIComponent(title + " " + artist)}`);
                if (!searchRes.ok) throw new Error("Recherche échouée (status " + searchRes.status + ")");
                const searchData = await searchRes.json();
                const tracks = searchData.tracks || [];

                if (tracks.length === 0) {
                    logBulk(`❌ Aucun résultat trouvé pour "${title}" - "${artist}"`);
                    failed++;
                    updateBulkProgress(processed, rows.length);
                    continue;
                }

                const bestMatch = tracks[0];

                logBulk(`🔗 Résolution du stream pour "${bestMatch.title}"...`);
                const streamUrl = await resolveStreamUrl(bestMatch.id);

                logBulk(`⬆️ Upload sur Catbox...`);
                const catboxUrl = await uploadCatboxByUrl(streamUrl);

                logBulk(`💾 Ajout au JSON...`);
                await addEntry(title, artist, catboxUrl);

                logBulk(`✅ Ajouté : "${title}" - "${artist}"`);
                added++;
            } catch (err) {
                logBulk(`❌ Erreur pour "${title}" - "${artist}" : ${err.message}`);
                failed++;
            }

            updateBulkProgress(processed, rows.length);
        }

        cancelBtn.style.display = "none";
        logBulk(`--- Import terminé : ${added} ajoutés, ${skipped} ignorés, ${failed} échoués ---`);
    }
</script>

</body>
</html>
